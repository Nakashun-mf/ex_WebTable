name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
      version:
        description: "Explicit version (e.g. 2.0.0). Overrides bump type when set."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  release:
    name: Bump version & create release tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Git bot identity ──────────────────────────────────────────────────────
      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ── Compute new version ───────────────────────────────────────────────────
      - name: Compute new version
        id: ver
        run: |
          CURRENT=$(node -pe "require('./manifest.json').version")
          echo "Current version: $CURRENT"

          if [[ -n "${{ inputs.version }}" ]]; then
            NEW="${{ inputs.version }}"
          else
            IFS='.' read -r MAJ MIN PAT <<< "$CURRENT"
            case "${{ inputs.bump }}" in
              major) NEW="$((MAJ+1)).0.0" ;;
              minor) NEW="${MAJ}.$((MIN+1)).0" ;;
              patch) NEW="${MAJ}.${MIN}.$((PAT+1))" ;;
            esac
          fi

          # Validate semver format
          if ! [[ "$NEW" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: $NEW  (expected x.y.z)"
            exit 1
          fi

          # Abort if tag already exists
          if git rev-parse "v${NEW}" >/dev/null 2>&1; then
            echo "::error::Tag v${NEW} already exists. Choose a different version."
            exit 1
          fi

          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "New version: $NEW"

      # ── Update manifest.json ──────────────────────────────────────────────────
      - name: Update manifest.json
        run: |
          node - <<'JS'
          const fs = require('fs');
          const m  = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
          m.version = process.env.NEW_VERSION;
          fs.writeFileSync('manifest.json', JSON.stringify(m, null, 2) + '\n');
          JS
        env:
          NEW_VERSION: ${{ steps.ver.outputs.new }}

      # ── Commit & tag ──────────────────────────────────────────────────────────
      - name: Commit version bump
        run: |
          git add manifest.json
          git commit -m "chore: bump version to v${{ steps.ver.outputs.new }}"

      - name: Create and push tag
        run: |
          git tag "v${{ steps.ver.outputs.new }}"
          git push origin HEAD:${{ github.event.repository.default_branch }} \
                          "v${{ steps.ver.outputs.new }}"
          echo "::notice::Tag v${{ steps.ver.outputs.new }} pushed — package.yml will now build the release."
