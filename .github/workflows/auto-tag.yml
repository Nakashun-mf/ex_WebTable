name: Auto Version Tag

on:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - ".github/**"
      - "manifest.json"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  tag-and-release:
    name: Bump version, tag, and release
    runs-on: ubuntu-latest
    # bot がバージョンを上げた際の無限ループを防ぐ
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Determine SemVer bump from commit messages
        id: bump
        run: |
          # 最新タグを semver 降順ソートで取得（同一コミットに複数タグがある場合も正確に最大値を得る）
          LAST_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LAST_TAG" ]; then
            LAST_TAG="v0.0.0"
          fi
          CURRENT=${LAST_TAG#v}
          echo "Last tag: $LAST_TAG  Current version: $CURRENT"

          COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"%s" 2>/dev/null)
          echo "Commits since $LAST_TAG:"
          echo "$COMMITS"

          if [ -z "$COMMITS" ]; then
            echo "No new commits since $LAST_TAG — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if echo "$COMMITS" | grep -qE "(BREAKING CHANGE|!:)"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE "^feat(\([^)]*\))?:"; then
            BUMP="minor"
          else
            BUMP="patch"
          fi
          echo "Bump type: $BUMP"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"

          if git rev-parse "v$NEW_VERSION" >/dev/null 2>&1; then
            echo "Tag v$NEW_VERSION already exists — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            m.version = '$NEW_VERSION';
            fs.writeFileSync('manifest.json', JSON.stringify(m, null, 2) + '\n');
          "
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Bumped: $CURRENT -> $NEW_VERSION ($BUMP)"

      - name: Push tag
        if: steps.bump.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin "v${{ steps.bump.outputs.version }}"

      - name: Create manifest.json bump PR
        if: steps.bump.outputs.skip != 'true'
        id: create_pr
        run: |
          BRANCH="chore/bump-version-v${{ steps.bump.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add manifest.json
          git commit -m "chore: bump version to v${{ steps.bump.outputs.version }}"
          git push origin "$BRANCH"

          EXISTING=$(gh pr list --base main \
            --head "$BRANCH" \
            --state open --json url --jq '.[0].url')
          if [ -n "$EXISTING" ]; then
            echo "pr_url=$EXISTING" >> "$GITHUB_OUTPUT"
          else
            PR_URL=$(gh pr create \
              --title "chore: bump version to v${{ steps.bump.outputs.version }}" \
              --body "Automated version bump to v${{ steps.bump.outputs.version }} (${{ steps.bump.outputs.bump }} bump)" \
              --base main \
              --head "$BRANCH")
            echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          fi
          gh pr merge --auto --squash "${{ steps.create_pr.outputs.pr_url }}" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Build & Release (同一ジョブで実行してGITHUB_TOKENトリガー問題を回避) ──

      - name: Setup Node.js
        if: steps.bump.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        if: steps.bump.outputs.skip != 'true'
        run: npm ci

      - name: Run tests
        if: steps.bump.outputs.skip != 'true'
        run: npm test

      - name: Build content script
        if: steps.bump.outputs.skip != 'true'
        run: npm run build

      - name: Generate icons
        if: steps.bump.outputs.skip != 'true'
        run: node generate-icons.js

      - name: Sync manifest.json version for ZIP
        if: steps.bump.outputs.skip != 'true'
        run: |
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            m.version = '${{ steps.bump.outputs.version }}';
            fs.writeFileSync('manifest.json', JSON.stringify(m, null, 2) + '\n');
          "

      - name: Create ZIP
        if: steps.bump.outputs.skip != 'true'
        run: |
          ZIP_NAME="webtable-enhancer-v${{ steps.bump.outputs.version }}.zip"
          zip -r "$ZIP_NAME" \
            manifest.json \
            background.js \
            content.js \
            styles.css \
            icons/
          echo "zip_name=$ZIP_NAME" >> "$GITHUB_ENV"
          unzip -l "$ZIP_NAME"

      - name: Upload artifact
        if: steps.bump.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: webtable-enhancer-v${{ steps.bump.outputs.version }}
          path: ${{ env.zip_name }}
          if-no-files-found: error

      - name: Create GitHub Release
        if: steps.bump.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.bump.outputs.version }}"
          name: "WebTable Enhancer v${{ steps.bump.outputs.version }}"
          body: |
            ## WebTable Enhancer v${{ steps.bump.outputs.version }}

            ### Installation
            Download the ZIP below and upload it to the [Chrome Developer Dashboard](https://chrome.google.com/webstore/devconsole/).

            ### What's new
            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          files: ${{ env.zip_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
