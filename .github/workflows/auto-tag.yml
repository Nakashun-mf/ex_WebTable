name: Auto Version Tag

on:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - ".github/**"
      - "manifest.json"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  tag:
    name: Determine SemVer bump and tag
    runs-on: ubuntu-latest
    # bot がバージョンを上げた際の無限ループを防ぐ
    if: github.actor != 'github-actions[bot]'
    outputs:
      version: ${{ steps.bump.outputs.version }}
      skip: ${{ steps.bump.outputs.skip }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Determine SemVer bump from commit messages
        id: bump
        run: |
          # 最新タグを semver 降順ソートで取得（同一コミットに複数タグがある場合も正確に最大値を得る）
          # git describe は同一コミットに複数タグがあると古い方を返すことがあるため使わない
          LAST_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LAST_TAG" ]; then
            LAST_TAG="v0.0.0"
          fi
          CURRENT=${LAST_TAG#v}
          echo "Last tag: $LAST_TAG  Current version: $CURRENT"

          # 最新タグ以降のコミットメッセージを取得
          COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"%s" 2>/dev/null)
          echo "Commits since $LAST_TAG:"
          echo "$COMMITS"

          # 新コミットがなければスキップ
          if [ -z "$COMMITS" ]; then
            echo "No new commits since $LAST_TAG — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Conventional Commits に基づいてバンプ種別を決定
          # BREAKING CHANGE または '!:' → MAJOR
          # feat: / feat(...): → MINOR
          # その他 → PATCH
          if echo "$COMMITS" | grep -qE "(BREAKING CHANGE|!:)"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE "^feat(\([^)]*\))?:"; then
            BUMP="minor"
          else
            BUMP="patch"
          fi
          echo "Bump type: $BUMP"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"

          # 算出したタグが既に存在する場合はスキップ（重複タグ防止）
          if git rev-parse "v$NEW_VERSION" >/dev/null 2>&1; then
            echo "Tag v$NEW_VERSION already exists — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            m.version = '$NEW_VERSION';
            fs.writeFileSync('manifest.json', JSON.stringify(m, null, 2) + '\n');
          "
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Bumped: $CURRENT -> $NEW_VERSION ($BUMP)"

      - name: Push tag on current commit
        if: steps.bump.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin "v${{ steps.bump.outputs.version }}"

      - name: Create branch and push version bump
        if: steps.bump.outputs.skip != 'true'
        run: |
          BRANCH="chore/bump-version-v${{ steps.bump.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add manifest.json
          git commit -m "chore: bump version to v${{ steps.bump.outputs.version }}"
          git push origin "$BRANCH"

      - name: Create PR for version bump
        if: steps.bump.outputs.skip != 'true'
        id: create_pr
        run: |
          # 同タイトルのPRが既にオープンな場合は再作成しない
          EXISTING=$(gh pr list --base main \
            --head "chore/bump-version-v${{ steps.bump.outputs.version }}" \
            --state open --json url --jq '.[0].url')
          if [ -n "$EXISTING" ]; then
            echo "PR already exists: $EXISTING"
            echo "pr_url=$EXISTING" >> "$GITHUB_OUTPUT"
          else
            PR_URL=$(gh pr create \
              --title "chore: bump version to v${{ steps.bump.outputs.version }}" \
              --body "Automated version bump to v${{ steps.bump.outputs.version }} (${{ steps.bump.outputs.bump }} bump)" \
              --base main \
              --head "chore/bump-version-v${{ steps.bump.outputs.version }}")
            echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
            echo "Created PR: $PR_URL"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge on version bump PR
        if: steps.bump.outputs.skip != 'true'
        run: |
          gh pr merge --auto --squash "${{ steps.create_pr.outputs.pr_url }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # GITHUB_TOKEN でのタグpushは他のワークフローをトリガーしないため、
  # workflow_call で package.yml を直接呼び出してリリースを作成する
  release:
    name: Build & Release
    needs: tag
    if: needs.tag.outputs.skip != 'true'
    uses: ./.github/workflows/package.yml
    with:
      version: ${{ needs.tag.outputs.version }}
    permissions:
      contents: write
