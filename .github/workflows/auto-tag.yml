name: Auto Version Tag

on:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - ".github/**"
      - "manifest.json"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  tag:
    name: Determine SemVer bump and tag
    runs-on: ubuntu-latest
    # bot がバージョンを上げた際の無限ループを防ぐ
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Determine SemVer bump from commit messages
        id: bump
        run: |
          # 最新タグを取得（なければ v0.0.0 をベースにする）
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          CURRENT=${LAST_TAG#v}
          echo "Last tag: $LAST_TAG  Current version: $CURRENT"

          # 最新タグ以降のコミットメッセージを取得
          COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"%s" 2>/dev/null)
          echo "Commits since $LAST_TAG:"
          echo "$COMMITS"

          # 新コミットがなければスキップ
          if [ -z "$COMMITS" ]; then
            echo "No new commits since $LAST_TAG — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

          # Conventional Commits に基づいてバンプ種別を決定
          # BREAKING CHANGE または '!:' → MAJOR
          # feat: / feat(...): → MINOR
          # その他 → PATCH
          if echo "$COMMITS" | grep -qE "(BREAKING CHANGE|!:)"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE "^feat(\([^)]*\))?:"; then
            BUMP="minor"
          else
            BUMP="patch"
          fi
          echo "Bump type: $BUMP"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"

          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            m.version = '$NEW_VERSION';
            fs.writeFileSync('manifest.json', JSON.stringify(m, null, 2) + '\n');
          "
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "Bumped: $CURRENT -> $NEW_VERSION ($BUMP)"

      - name: Push tag on current commit
        if: steps.bump.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin "v${{ steps.bump.outputs.version }}"

      - name: Create branch and push version bump
        if: steps.bump.outputs.skip != 'true'
        run: |
          BRANCH="chore/bump-version-v${{ steps.bump.outputs.version }}"
          git checkout -b "$BRANCH"
          git add manifest.json
          git commit -m "chore: bump version to v${{ steps.bump.outputs.version }}"
          git push origin "$BRANCH"

      - name: Create PR for version bump
        if: steps.bump.outputs.skip != 'true'
        id: create_pr
        run: |
          PR_URL=$(gh pr create \
            --title "chore: bump version to v${{ steps.bump.outputs.version }}" \
            --body "Automated version bump to v${{ steps.bump.outputs.version }} (${{ steps.bump.outputs.bump }} bump)" \
            --base main \
            --head "chore/bump-version-v${{ steps.bump.outputs.version }}")
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "Created PR: $PR_URL"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge on version bump PR
        if: steps.bump.outputs.skip != 'true'
        run: |
          gh pr merge --auto --squash "${{ steps.create_pr.outputs.pr_url }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
