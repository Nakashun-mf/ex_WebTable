name: Package Extension

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version string (e.g. 1.0.0). Leave blank to use manifest version."
        required: false
        default: ""
  # auto-tag.yml から直接呼び出す（GITHUB_TOKEN でのタグpushは他のワークフローをトリガーしないため）
  workflow_call:
    inputs:
      version:
        description: "Version string to package and release"
        type: string
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build & Release ZIP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # workflow_call / workflow_dispatch でバージョン指定がある場合はそのタグをチェックアウト
          ref: ${{ inputs.version != '' && format('refs/tags/v{0}', inputs.version) || github.ref }}

      # ── Resolve version ─────────────────────────────────────────────────────
      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(node -pe "require('./manifest.json').version")
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Packaging version: $VERSION"

      # ── Sync manifest.json version ───────────────────────────────────────────
      - name: Sync manifest.json version
        if: github.event_name != 'workflow_dispatch' || inputs.version != ''
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            m.version = '$VERSION';
            fs.writeFileSync('manifest.json', JSON.stringify(m, null, 2) + '\n');
          "
          echo "Updated manifest.json to version $VERSION"

      # ── Setup Node.js ───────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ── Install dependencies ─────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Run tests ────────────────────────────────────────────────────────────
      - name: Run tests
        run: npm test

      # ── Build content script ─────────────────────────────────────────────────
      - name: Build content script
        run: npm run build

      # ── Generate icons ───────────────────────────────────────────────────────
      - name: Generate icons
        run: node generate-icons.js

      # ── Build ZIP (extension files only) ────────────────────────────────────
      - name: Create ZIP
        run: |
          ZIP_NAME="webtable-enhancer-v${{ steps.ver.outputs.version }}.zip"
          zip -r "$ZIP_NAME" \
            manifest.json \
            background.js \
            content.js \
            styles.css \
            icons/
          echo "zip_name=$ZIP_NAME" >> "$GITHUB_ENV"
          echo "Created: $ZIP_NAME"
          unzip -l "$ZIP_NAME"

      # ── Upload as workflow artifact ──────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: webtable-enhancer-v${{ steps.ver.outputs.version }}
          path: ${{ env.zip_name }}
          if-no-files-found: error

      # ── Create GitHub Release ────────────────────────────────────────────────
      - name: Create GitHub Release
        if: >
          (github.event_name == 'push' && github.ref_type == 'tag') ||
          github.event_name == 'workflow_call' ||
          (github.event_name == 'workflow_dispatch' && inputs.version != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.ver.outputs.version }}"
          name: "WebTable Enhancer v${{ steps.ver.outputs.version }}"
          body: |
            ## WebTable Enhancer v${{ steps.ver.outputs.version }}

            ### Installation
            Download the ZIP below and upload it to the [Chrome Developer Dashboard](https://chrome.google.com/webstore/devconsole/).

            ### What's new
            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          files: ${{ env.zip_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
